# Remove the installer (and other live-only bits) from the installed system.
# More live-only packages (archiso helpers, etc.) can be added to try_remove
# once verified not to break the target.
---
backend: pacman
pacman:
    num_retries: 3
    disable_download_timeout: true
    needed_only: false
operations:
  - try_remove:
    - calamares
