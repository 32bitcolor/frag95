# GRUB on both BIOS and UEFI (frag95 targets all PC hardware). The only kernel
# is the mainline `linux` package; its no-autodetect fallback initramfs recovers.
---
efiBootLoader: "grub"
kernel: "/vmlinuz-linux"
img: "/initramfs-linux.img"
fallback: "/initramfs-linux-fallback.img"
timeout: "5"
bootloaderEntryName: "Frag95"
kernelLine: ", with Frag95"
fallbackKernelLine: ", with Frag95 (fallback)"
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"
installEFIFallback: true
