---
overwrite: true
defaults:
    GRUB_TIMEOUT: 5
    # Single kernel (linux); entry 0 is the main "Frag95 Linux". Deterministic
    # default (no saved-entry / lts-first ambiguity).
    GRUB_DEFAULT: 0
    GRUB_DISABLE_SUBMENU: true
    GRUB_TERMINAL_OUTPUT: "console"
    GRUB_DISTRIBUTOR: "Frag95"
    # os-prober isn't shipped (see packages.add); disable it so grub-mkconfig
    # doesn't warn looking for it.
    GRUB_DISABLE_OS_PROBER: true
