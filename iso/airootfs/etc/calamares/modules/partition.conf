# Frag95 disk partitioning.
#
# Without this file Calamares falls back to compiled defaults that do NOT offer
# "Erase disk" on a UEFI machine whose disk already holds an OS — it has no
# efiSystemPartition configured, so it can't lay out a fresh ESP. (An empty disk,
# like the test VM, still gets erase; a real laptop with Windows did not.) So
# define the ESP, enable every choice, and default to a clean full-disk erase.
---
efiSystemPartition:     "/boot/efi"
efiSystemPartitionSize: "512MiB"
efiSystemPartitionName: "EFI"

userSwapChoices:
    - none
    - small
    - suspend
    - file

drawNestedPartitions:      false
alwaysShowPartitionLabels: true
allowManualPartitioning:   true

initialPartitioningChoice: erase
initialSwapChoice:         none

defaultFileSystemType: "ext4"
availableFileSystemTypes:
    - "ext4"
    - "btrfs"
    - "xfs"
