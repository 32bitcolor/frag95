# Copy the live root filesystem (the squashfs) onto the target partition.
#
# The Python unpackfs module reads the top-level key `unpack` (NOT `unpackfs`).
# The source path is archiso-version-specific; confirmed on a real boot to be
# /run/archiso/bootmnt/frag95/x86_64/airootfs.sfs (install_dir is "frag95").
---
unpack:
    - source: "/run/archiso/bootmnt/frag95/x86_64/airootfs.sfs"
      sourcefs: "squashfs"
      destination: ""
