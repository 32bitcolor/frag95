# Copy the live root filesystem (the squashfs) onto the target partition.
#
# NOTE: the source path is archiso-version-specific and is the FIRST thing to
# verify on a real boot — confirm where the live ISO mounts airootfs.sfs
# (e.g. `findmnt | grep archiso` / `ls /run/archiso`). install_dir is "frag95".
---
unpackfs:
    - source: "/run/archiso/bootmnt/frag95/x86_64/airootfs.sfs"
      sourcefs: "squashfs"
      destination: ""
