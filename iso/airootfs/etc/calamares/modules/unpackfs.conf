# Copy the live root filesystem onto the target partition.
#
# The Python unpackfs module reads the top-level key `unpack` (NOT `unpackfs`).
#
# Source the ALREADY-MOUNTED squashfs directory (/run/archiso/airootfs), which
# archiso provides in EVERY boot mode. The .sfs FILE path is not portable:
# /run/archiso/bootmnt/... on a normal boot, but /run/archiso/copytoram/...
# when copytoram is active (Ventoy triggers it). The mounted dir is constant,
# and it's the pristine RO squashfs (not the live overlay), so installs stay clean.
#
# sourcefs MUST name a kernel-loaded filesystem (the module rejects anything not
# in /proc/filesystems before it runs) AND its file-count path must cope with a
# directory source. "ext4" satisfies both: directory sources are bind-mounted
# regardless of sourcefs, and the ext4 branch counts files with `find` on the
# mountpoint. ("directory" fails the kernel check; "squashfs" would run
# `unsquashfs -l` on the directory and abort.)
---
unpack:
    - source: "/run/archiso/airootfs"
      sourcefs: "ext4"
      destination: ""
