# Convert the unpacked live (archiso) rootfs into a proper installed system, in
# the target chroot, BEFORE the GPU + initramfs + bootloader steps. Inlined (not
# a /usr/local/bin script) on purpose: a script would be read from the unpacked
# squashfs and lag edits to this config; the commands here always run as-written.
#
# NOTE: Calamares does ${var} substitution on this script, so it must contain NO
# shell variables ($name) — globs and literals only.
---
dontChroot: false
timeout: 120
script:
    - |
        # de-archiso mkinitcpio: the live 'archiso' preset + archiso.conf have
        # live-only HOOKS that fail on disk. Replace with a normal config.
        # (microcode hook dropped: archiso doesn't ship the ucode imgs in the
        # squashfs /boot; fine for a VM, refine for bare metal later.)
        rm -f /etc/mkinitcpio.conf.d/archiso.conf
        cat > /etc/mkinitcpio.conf <<'MKC'
        MODULES=()
        BINARIES=()
        FILES=()
        HOOKS=(base udev autodetect modconf kms keyboard keymap consolefont block filesystems fsck)
        MKC
        cat > /etc/mkinitcpio.d/linux.preset <<'PRE'
        ALL_config="/etc/mkinitcpio.conf"
        ALL_kver="/boot/vmlinuz-linux"
        PRESETS=('default' 'fallback')
        default_image="/boot/initramfs-linux.img"
        fallback_image="/boot/initramfs-linux-fallback.img"
        fallback_options="-S autodetect"
        PRE
        # archiso keeps the kernel on the ISO, not in the squashfs /boot — restore
        # the mainline kernel from the installed modules tree so mkinitcpio + GRUB
        # can find it. (linux-lts boot setup is a later refinement.)
        mkdir -p /boot
        cp -f /usr/lib/modules/*-arch*/vmlinuz /boot/vmlinuz-linux
        # drop the live-only bits
        if id frag >/dev/null 2>&1; then userdel -r frag 2>/dev/null || userdel frag 2>/dev/null || true; fi
        rm -f /etc/sddm.conf.d/20-frag95-autologin.conf
        # Pin the Frag95 (Win9x) SDDM greeter. /etc/sddm.conf, written by the
        # displaymanager step that ran just before us, out-ranks our conf.d
        # drop-in, so force the theme in that highest-precedence file too.
        if grep -q '^\[Theme\]' /etc/sddm.conf 2>/dev/null; then
            if grep -q '^Current=' /etc/sddm.conf; then
                sed -i 's/^Current=.*/Current=frag95/' /etc/sddm.conf
            else
                sed -i '/^\[Theme\]/a Current=frag95' /etc/sddm.conf
            fi
        else
            printf '\n[Theme]\nCurrent=frag95\n' >> /etc/sddm.conf
        fi
        rm -f /etc/sudoers.d/10-wheel-nopasswd
        rm -f /etc/xdg/kscreenlockerrc
        rm -f /usr/share/applications/install-frag95.desktop
        rm -f /etc/polkit-1/rules.d/49-frag95-calamares.rules
        true
