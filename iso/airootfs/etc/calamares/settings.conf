# Frag95 Calamares configuration — offline install: unpack the live squashfs to
# the target, then configure it per-machine. Mirrors the standard archiso flow.
---
modules-search: [ local, /usr/lib/calamares/modules ]

# Named shellprocess instances (our GPU profile + live->installed cleanup).
instances:
- id: gpu
  module: shellprocess
  config: shellprocess_gpu.conf
- id: cleanup
  module: shellprocess
  config: shellprocess_cleanup.conf

sequence:
- show:
  - welcome
  - locale
  - keyboard
  - partition
  - users
  - summary
- exec:
  - partition
  - mount
  - unpackfs
  - machineid
  - fstab
  - locale
  - keyboard
  - localecfg
  - users
  - displaymanager
  - networkcfg
  - hwclock
  - services-systemd
  - initcpiocfg
  - shellprocess@gpu
  - initcpio
  - grubcfg
  - bootloader
  - shellprocess@cleanup
  - umount
- show:
  - finished

branding: frag95

# Require a real install (no demo), run modules inside the target chroot.
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: false
quit-at-end: false
