[General]
; Frag95 default octopi config. Presets paru (already shipped) as the AUR helper
; so octopi's AUR browsing/search works out of the box -- click the "AUR" toggle
; in octopi to search + install AUR packages graphically. No separate AUR GUI or
; yay needed (octopi 0.19 supports paru natively).
Aur_Tool_Name=paru
Backend=alpm
Instant_Search=true
