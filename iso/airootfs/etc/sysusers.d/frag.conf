# Create the Frag95 live user non-destructively at ISO build time.
# systemd-sysusers appends this user (and its home/skel) without clobbering
# the package-created system users. Password is locked; login happens via
# SDDM autologin, and sudo is passwordless for the live session (see
# /etc/sudoers.d/10-wheel-nopasswd). The Calamares installer creates the
# real user with a password at install time.
u frag 1000 "Frag95 Live User" /home/frag /usr/bin/bash
m frag wheel
