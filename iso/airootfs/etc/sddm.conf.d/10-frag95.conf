# Frag95 live-session SDDM config: autologin the live user into Plasma X11.
# (X11 is the default session for maximum gaming/overlay compatibility on
# NVIDIA; the Wayland session remains selectable from the login screen.)
[Autologin]
User=frag
Session=plasmax11
Relogin=true

[General]
# Default to the X11 Plasma session.

[Theme]
# Breeze SDDM greeter, recolored teal to match the 9x desktop (see
# /usr/share/sddm/themes/breeze/theme.conf.user). Mostly seen on installed
# systems — the live image autologins past it.
Current=breeze

