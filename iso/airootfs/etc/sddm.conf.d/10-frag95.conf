# Frag95 SDDM config that persists onto installed systems (the live-only
# autologin lives in 20-frag95-autologin.conf, which the installer removes).
[General]
# Default to the X11 Plasma session (most compatible for Steam/Proton/overlays
# on NVIDIA); the Wayland session remains selectable at the greeter.

[Theme]
# Breeze SDDM greeter, recolored teal to match the 9x desktop (see
# /usr/share/sddm/themes/breeze/theme.conf.user).
Current=breeze
