#
# Frag95 pacman.conf (used both for building the ISO and shipped to the live system).
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Required for Steam and all lib32-* gaming packages.
[multilib]
Include = /etc/pacman.d/mirrorlist

# Frag95 local repo: AUR packages prebuilt by scripts/build-localrepo.sh
# (paru, octopi, envycontrol, nvidia-470xx-*). The packages live in
# /var/lib/frag95-repo on the live system; at ISO-build time assemble-iso.sh
# exposes the same path so pacstrap can install from here too. Unsigned local
# packages, hence TrustAll. Listed last so official repos win version ties.
[frag95]
SigLevel = Optional TrustAll
Server = file:///var/lib/frag95-repo
