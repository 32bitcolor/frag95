#
# Frag95 pacman.conf (used both for building the ISO and shipped to the live system).
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

# Required for Steam and all lib32-* gaming packages.
[multilib]
Include = /etc/pacman.d/mirrorlist

# Frag95 local repo (prebuilt non-official packages: paru, octopi, ...).
# Enabled starting Phase 2, once scripts/build-localrepo.sh populates it.
#[frag95]
#SigLevel = Optional TrustAll
#Server = file:///var/lib/frag95-repo
